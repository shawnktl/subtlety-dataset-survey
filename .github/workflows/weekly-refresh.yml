name: Weekly refresh (links + candidates + site)

# Unattended weekly maintenance for the survey:
#   1. verify_links.py   — check every source/access URL, write notes/link-status.md
#   2. find_candidates.py — multi-channel fetch-only scan, write notes/candidates.md
#   3. build_site.py     — regenerate docs/ from the markdown sources
#   4. open a PR with whatever changed (idempotent: no PR on a no-op week)
#
# This workflow NEVER edits dataset content or invents descriptions. It reports
# link drift + surfaces candidate datasets; an agent later curates candidates into
# dataset pages via notes/refresh-agent.md (with human review).
#
# IMPORTANT — PR-creation permission:
#   peter-evans/create-pull-request fails with "GitHub Actions is not permitted to
#   create or approve pull requests" unless the repo setting is ON:
#     Settings -> Actions -> General -> Workflow permissions ->
#       "Allow GitHub Actions to create and approve pull requests"
#   One-flip CLI fix:
#     gh api -X PUT repos/shawnktl/subtlety-dataset-survey/actions/permissions/workflow \
#       -F can_approve_pull_request_reviews=true
#   (As of 2026-06-22 this is ON for shawnktl/subtlety-dataset-survey.)

on:
  schedule:
    # Weekly, Sunday 06:00 UTC.
    - cron: "0 6 * * 0"
  workflow_dispatch:

# create-pull-request needs write to push the branch + open the PR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        # Node20-based action; current major as of 2026-06 (mind the Node 20
        # runtime deprecation on 2026-09-16 — bump majors when GitHub ships them).
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (if any are pinned)
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt — scripts are stdlib-only."
          fi

      - name: Verify links
        # Always exits 0; dead links are findings reported in notes/link-status.md.
        run: python scripts/verify_links.py

      - name: Find candidate datasets
        # Fetch-only multi-channel scan; exits 0 even on partial/rate-limited failure.
        run: python scripts/find_candidates.py

      - name: Rebuild site
        run: python scripts/build_site.py

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git status --porcelain
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes this run — skipping PR (idempotent no-op)."
          fi

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/weekly-refresh
          base: master
          commit-message: "agent: weekly refresh — link status, candidates, rebuilt site"
          title: "Weekly refresh: link status + candidate datasets + rebuilt site"
          delete-branch: true
          add-paths: |
            notes/link-status.md
            notes/candidates.md
            docs/**
          body: |
            ## Automated weekly refresh

            Generated by `.github/workflows/weekly-refresh.yml`. This PR contains
            **only mechanical updates** — link-availability status, freshly-scanned
            dataset candidates, and a regenerated site. **No dataset content was
            edited or invented.**

            ### What changed
            - **`notes/link-status.md`** — re-checked every source/access URL
              (`verify_links.py`). Triage any `dead` / `forbidden` rows; a 403 is
              usually a bot-block, not a removed resource.
            - **`notes/candidates.md`** — multi-channel fetch-only scan
              (`find_candidates.py`) for newly-published subtlety / perceptibility /
              conspicuity datasets, deduped against `datasets/`. **Leads, not curated
              entries** — an agent triages them per `notes/refresh-agent.md`.
            - **`docs/`** — rebuilt from the markdown sources (`build_site.py`) if any
              source changed.

            ### Next step (human / agent)
            Follow `notes/refresh-agent.md`: triage `notes/candidates.md`, run the
            manual-pass channels, curate confirmed datasets (≤8/run, ≤2/modality),
            and append what worked to the effectiveness log in
            `notes/search-strategy.md`.

            > The cron surfaces candidates; it never auto-adds dataset pages.
